id: shaheen-security-headers
info:
  name: "Missing Security Headers"
  author: Professor Snape
  severity: low
  description: Detects absence of important HTTP security headers
  tags: headers,misconfiguration,owasp-a05

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    matchers-condition: or
    matchers:
      - type: word
        part: header
        negative: true
        words:
          - "Content-Security-Policy"
      - type: word
        part: header
        negative: true
        words:
          - "X-Frame-Options"
      - type: word
        part: header
        negative: true
        words:
          - "Strict-Transport-Security"
      - type: word
        part: header
        negative: true
        words:
          - "X-Content-Type-Options"
